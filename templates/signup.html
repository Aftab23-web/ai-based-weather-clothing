<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('/static/images/signup-bg.jpg'); /*  Replace with your background */
      background-size: cover;
      background-position: center;
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 text-gray-800">

  <div class="glass max-w-lg w-full p-8 sm:p-10 rounded-2xl shadow-2xl border border-white/30">
    <h2 class="text-3xl font-extrabold text-center text-white drop-shadow mb-6"> Create an Account</h2>

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-white font-medium mb-1">Name</label>
        <input name="name" type="text" placeholder="Your Name" required
               class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Gender</label>
        <select name="gender" required
                class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Age</label>
        <input type="number" name="age" placeholder="Your Age" required
               class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Phone Number</label>
        <input name="whatsapp" type="text" placeholder="e.g. +91xxxxxxxxxx" required
               class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Email</label>
        <input name="email" type="email" placeholder="you@example.com" required
               class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Password Field Wrapper -->
<div class="relative w-full">
  <!-- Password Input -->
  <input type="password" id="password" name="password" placeholder="........"
         class="w-full px-4 py-2 rounded-md bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 pr-10">

  <!-- Toggle Button -->
  <button type="button" id="togglePassword"
          class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-400 hover:text-gray-600 focus:outline-none">
    <!-- Default: Eye-off (slashed eye) -->
    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M13.875 18.825A10.05 10.05 0 0112 19C6.477 19 2 14.523 2 9.998 2 8.98 2.152 7.997 2.438 7.069m4.136 4.13A3 3 0 0012 15a3 3 0 002.121-.879m1.76-1.76a3 3 0 00.879-2.121 3 3 0 00-.879-2.121M15 9h.01M2.458 12C3.732 7.943 7.522 5 12 5c1.682 0 3.265.42 4.625 1.158" />
    </svg>
  </button>
</div>
      <button type="submit"
              class="w-full bg-gradient-to-r from-green-500 to-lime-500 text-white font-bold py-2 rounded-md hover:opacity-90 transition">
        Sign Up
      </button>
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="flash-message">
        <p class="error">{{ messages[0] }}</p>
      </div>
      {% endif %}
      {% endwith %}
    </form>

    <p class="text-center mt-5 text-sm text-white/90">
      Already have an account?
      <a href="/login" class="text-green-200 hover:underline">Login</a>
    </p>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
