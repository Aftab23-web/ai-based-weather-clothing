<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0ea5e9">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('/static/images/login-bg.jpg'); /*  Replace with your image */
      background-size: cover;
      background-position: center;
    }
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-800">

  <div class="glass max-w-md w-full p-8 rounded-xl shadow-2xl border border-white/20">
    <h2 class="text-3xl font-bold text-center text-white mb-6 drop-shadow">Forgot Password</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-center font-semibold">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-5">
      <div>
        <label for="email" class="block text-white font-medium mb-1">Your Registered Email</label>
        <input name="email" type="email" placeholder="you@example.com" required
               class="w-full px-4 py-2 rounded-md bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <button type="submit"
              class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white font-bold py-2 rounded-md hover:opacity-90 transition">
        Send Reset Code
      </button>
    </form>

    <div class="text-center mt-4 text-sm text-white/90">
      <a href="/login" class="text-blue-200 hover:underline"> Back to Login</a>
    </div>
  </div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js')
      .then(function(reg) {
        console.log("Service Worker registered ");
      });
  }
</script>
  <script src="/static/script.js"></script>
</body>
</html>
